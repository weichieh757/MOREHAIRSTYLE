<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMO 後台管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Admin specific overrides */
        body {
            padding: 2rem;
            /* Prevent pull-to-refresh on mobile while dragging */
            overscroll-behavior: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: rgb(2, 80, 119);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        /* Inputs are handled in styles.css generally, but ensuring overrides here if needed */


        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 5px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }

        .checkbox-label input {
            margin-right: 8px;
            width: 18px;
            height: 18px;
        }

        /* 雙層規格樣式 */
        .variant-box {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            background: #fdfdfd;
            margin-top: 10px;
        }

        .variant-header {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #666;
            font-weight: bold;
        }

        .variant-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .v-input-lg {
            flex: 2;
        }

        .v-input-sm {
            flex: 1;
        }

        .btn-add-variant {
            background: #27ae60;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-remove-variant {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-submit {
            background: rgb(2, 80, 119);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }

        .btn-submit:hover {
            background: var(--accent);
        }

        .btn-cancel {
            background: #7f8c8d;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            display: none;
        }

        .editing .btn-submit {
            background: #e67e22;
        }

        .editing .btn-submit::after {
            content: " (確認修改)";
        }

        .product-list {
            margin-top: 3rem;
        }

        .product-item {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding: 1rem 0;
            gap: 1rem;
        }

        .product-img-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
        }

        .product-info {
            flex-grow: 1;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            background: #f39c12;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        #imagePositionEditor {
            display: none;
            margin-top: 1rem;
            background: #f9f9f9;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        #imagePositionEditor.active {
            display: block;
        }

        .pos-group-title {
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        .pos-edit-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
        }

        .pos-edit-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
            border: 2px solid #ddd;
        }

        .pos-select-display {
            flex-grow: 1;
            padding: 8px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #555;
            cursor: pointer;
        }

        .btn-pos-edit {
            background: #8e44ad;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .pos-control-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* ✨ 圖片位置編輯器 Modal 樣式 ✨ */
        .pos-modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            position: relative;
            text-align: center;
        }

        .pos-preview-container {
            width: 100%;
            height: 300px;
            background: #eee;
            border: 2px dashed #ccc;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            cursor: grab;
            touch-action: none;
            /* Prevent scroll while dragging */
        }

        .pos-preview-container:active {
            cursor: grabbing;
        }

        .pos-preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 50% 50%;
            /* Initial Default */
            pointer-events: none;
            /* Let container handle events */
        }

        /* Crosshair overlay */
        .pos-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
        }

        .pos-overlay::before,
        .pos-overlay::after {
            content: "";
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }

        .pos-overlay::before {
            width: 100%;
            height: 1px;
        }

        /* Horizontal line */
        .pos-overlay::after {
            width: 1px;
            height: 100%;
        }

        /* Vertical line */

        /* ✨ 圖片庫 Modal 樣式 ✨ */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 800px;
            max-height: 70vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #aaa;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .gallery-item {
            position: relative;
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 5px;
            overflow: hidden;
            aspect-ratio: 1/1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item.selected {
            border-color: var(--accent);
        }

        .gallery-item.selected::after {
            content: "✔";
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            text-align: center;
            font-size: 14px;
            line-height: 20px;
        }

        .btn-gallery {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }

        .btn-gallery-confirm {
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
        }

        /* ✨ 分頁籤 (Tabs) 樣式 ✨ */
        .tab-nav {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
            color: #666;
            border-bottom: 3px solid transparent;
            font-weight: bold;
        }

        .tab-btn.active {
            color: rgb(2, 80, 119);
            border-bottom-color: rgb(2, 80, 119);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .gallery-delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(231, 76, 60, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            z-index: 10;
        }

        .gallery-delete-btn:hover {
            background: #c0392b;
        }

        /* ⭐ 首圖選擇器樣式 */
        .cover-radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #888;
            margin-top: 6px;
        }

        .cover-radio-label input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #e67e22;
        }

        .cover-radio-label.is-cover {
            color: #e67e22;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container" id="mainContainer">
        <h1 id="pageTitle">後台管理系統</h1>

        <!-- ✨ 分頁籤導覽 ✨ -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('tab-products')">📦 商品管理</button>
            <button class="tab-btn" onclick="switchTab('tab-orders')">📝 訂單管理</button>
            <button class="tab-btn" onclick="switchTab('tab-gallery')">🖼️ 圖片庫管理</button>
            <button class="tab-btn" onclick="switchTab('tab-contacts')">💌 顧客留言</button>
        </div>

        <!-- ✨ 1. 商品管理分頁 ✨ -->
        <div id="tab-products" class="tab-content active">
            <h2 id="formTitle" style="border-left:5px solid rgb(2, 80, 119); padding-left:10px;">新增商品</h2>

            <form id="uploadForm">
                <input type="hidden" id="editId">
                <input type="hidden" id="coverIndex" name="cover_index" value="0">

                <div class="form-group">
                    <label>商品名稱</label>
                    <input type="text" name="name" id="pName" required>
                </div>

                <div class="form-group">
                    <label>基本價格 (顯示用)</label>
                    <input type="number" name="price" id="pPrice" required>
                </div>

                <div class="form-group">
                    <label>多規格選項 (可設定單層或雙層)</label>
                    <div class="variant-box">
                        <div class="variant-header">
                            <span style="flex:2">規格一 (如:功能/顏色)</span>
                            <span style="flex:2">規格二 (如:大小/容量) *選填</span>
                            <span style="flex:1">價格</span>
                            <span style="width:45px"></span>
                        </div>
                        <div id="variantList"></div>
                        <button type="button" class="btn-add-variant" onclick="addVariantRow()">+ 新增規格</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>分類 (可複選)</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" name="category" value="洗髮"> 洗髮</label>
                        <label class="checkbox-label"><input type="checkbox" name="category" value="染髮"> 染髮</label>
                        <label class="checkbox-label"><input type="checkbox" name="category" value="燙髮"> 燙髮</label>
                        <label class="checkbox-label"><input type="checkbox" name="category" value="保養"> 保養</label>
                        <label class="checkbox-label"><input type="checkbox" name="category" value="煥采"> 煥采</label>
                        <label class="checkbox-label"><input type="checkbox" name="category" value="活萃"> 活萃</label>
                        <label class="checkbox-label"><input type="checkbox" name="category" value="R.O.8">
                            R.O.8</label>
                        <label class="checkbox-label"><input type="checkbox" name="category" value="S.I.G">
                            S.I.G</label>
                        <label class="checkbox-label"><input type="checkbox" name="category" value="日本"> 日本</label>
                        <label class="checkbox-label"><input type="checkbox" name="category" value="韓國"> 韓國</label>
                        <label class="checkbox-label"><input type="checkbox" name="category" value="其他"> 其他</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>商品描述</label>
                    <textarea name="description" id="pDesc" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>商品圖片 (新上傳 或 從圖庫選擇)</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <button type="button" class="btn-gallery" onclick="openGallery()">從圖庫選擇</button>
                        <input type="file" name="photos" id="fileInput" multiple accept="image/*"
                            onchange="previewFiles()" style="flex-grow: 1;">
                    </div>
                </div>

                <div id="imagePositionEditor">
                    <div id="positionTitle" class="pos-group-title">圖片預覽與位置設定</div>
                    <div id="positionList"></div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">立即上架</button>
                <button type="button" id="cancelBtn" class="btn-cancel" onclick="resetForm()">取消編輯</button>
            </form>

            <hr style="margin: 3rem 0;">

            <h2>已上架商品列表</h2>
            <div id="productList" class="product-list"></div>
        </div>

        <!-- ✨ 2. 訂單管理分頁 ✨ -->
        <div id="tab-orders" class="tab-content">
            <h2>📦 訂單列表</h2>
            <div id="orderList" class="product-list">載入中...</div>
        </div>

        <!-- ✨ 3. 圖片庫管理分頁 ✨ -->
        <div id="tab-gallery" class="tab-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>🖼️ 圖片庫管理</h2>
                <button onclick="loadGalleryManager()" class="btn-gallery">重新整理</button>
            </div>
            <p style="color:#666; margin-bottom:1rem;">這裡顯示伺服器上的所有圖片。您可以刪除不再使用的舊圖。</p>
            <div id="galleryManagerGrid" class="gallery-grid">載入中...</div>
        </div>

        <!-- ✨ 4. 顧客留言分頁 ✨ -->
        <div id="tab-contacts" class="tab-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>💌 顧客留言 / 預約列表</h2>
                <button onclick="loadContacts()" class="btn-gallery">重新整理</button>
            </div>
            <div id="contactList" class="product-list">載入中...</div>
        </div>
    </div>

    <div id="galleryModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeGallery()">&times;</span>
            <h2>選擇現有圖片</h2>
            <div id="galleryGrid" class="gallery-grid">載入中...</div>
            <button class="btn-gallery-confirm" onclick="confirmGallerySelection()">確認選擇</button>
        </div>
    </div>

    <!-- ✨ 視覺化位置編輯器 Model ✨ -->
    <div id="posEditorModal" class="modal">
        <div class="pos-modal-content">
            <h2>調整圖片顯示位置</h2>
            <p style="font-size:0.9rem; color:#666;">請在下方圖片上按住滑鼠拖曳，調整顯示重點</p>

            <div class="pos-preview-container" id="posDragArea">
                <img src="" id="posPreviewImg" class="pos-preview-img">
                <div class="pos-overlay"></div>
            </div>

            <div style="margin-bottom: 20px; font-family: monospace;">
                位置：<span id="posValueDisplay">50% 50%</span>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="rotationSlider" style="margin-bottom:10px;">旋轉角度：<span
                        id="rotValueDisplay">0°</span></label>
                <input type="range" id="rotationSlider" min="0" max="360" value="0" style="width: 80%;"
                    oninput="updateRotationPreview(this.value)">
                <button type="button" class="btn-pos-edit"
                    onclick="document.getElementById('rotationSlider').value=0; updateRotationPreview(0);"
                    style="margin-left: 10px; padding: 5px 10px;">重置</button>
            </div>

            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn-submit" onclick="savePosition()"
                    style="width:auto; padding: 10px 30px;">確認儲存</button>
                <button class="btn-cancel" onclick="closePosEditor()"
                    style="display:inline-block; width:auto;">取消</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/products';
        const GALLERY_API = '/api/images';
        let allProducts = [];

        // ✨ 暫存使用者選擇的舊圖片網址 ✨
        let selectedGalleryImages = [];

        // 全域變數：追蹤目前正在編輯的 input 欄位
        let currentEditingInput = null;

        function addVariantRow(s1 = "", s2 = "", price = "") {
            const div = document.createElement('div');
            div.className = 'variant-row';
            div.innerHTML = `
            <input type="text" placeholder="例如: 保濕型" class="v-s1 v-input-lg" value="${s1}">
            <input type="text" placeholder="例如: 300ml" class="v-s2 v-input-lg" value="${s2}">
            <input type="number" placeholder="價格" class="v-price v-input-sm" value="${price}">
            <button type="button" class="btn-remove-variant" onclick="this.parentElement.remove()">刪除</button>
        `;
            document.getElementById('variantList').appendChild(div);
        }

        async function loadProducts() {
            try {
                const res = await fetch(API_URL);
                allProducts = await res.json();
                const list = document.getElementById('productList');
                list.innerHTML = '';

                allProducts.forEach(p => {
                    let imgUrl = (p.images && p.images.length > 0) ? p.images[0] : 'https://placehold.co/100';
                    let catText = Array.isArray(p.category) ? p.category.join(', ') : p.category;
                    let variantHint = (p.variants && p.variants.length > 0) ? `<span style="color:blue; font-size:0.8rem;">(多規格)</span>` : '';

                    list.innerHTML += `
                    <div class="product-item">
                        <img src="${imgUrl}" class="product-img-thumb" onerror="this.src='https://placehold.co/100'">
                        <div class="product-info">
                            <strong>${p.name} ${variantHint}</strong> <br>
                            <span style="color: #666; font-size: 0.9rem;">$${p.price} | ${catText}</span>
                        </div>
                        <div class="action-btns">
                            <button class="btn-edit" onclick="startEdit(${p.id})">編輯</button>
                            <button class="btn-delete" onclick="deleteProduct(${p.id})">刪除</button>
                        </div>
                    </div>
                `;
                });
            } catch (e) { console.error("載入失敗", e); }
        }

        // ✨ 整合預覽功能：混合「新上傳檔案」與「已選舊圖片」 ✨
        function previewFiles() {
            const fileInput = document.getElementById('fileInput');
            const posList = document.getElementById('positionList');
            const editor = document.getElementById('imagePositionEditor');
            const title = document.getElementById('positionTitle');
            posList.innerHTML = '';

            const hasFiles = fileInput.files && fileInput.files.length > 0;
            const hasGallery = selectedGalleryImages.length > 0;

            if (hasFiles || hasGallery) {
                editor.classList.add('active');
                title.innerText = "圖片預覽與位置設定 (新檔案 + 已選圖片)";

                let totalIndex = 0;

                // 1. 先顯示剛剛在圖庫選的舊圖
                selectedGalleryImages.forEach(imgUrl => {
                    const defaultPos = "50% 50%";
                    const defaultRot = 0;
                    const isCover = (totalIndex === 0); // 預設第一張為首圖
                    posList.innerHTML += createPosEditRow(imgUrl, totalIndex + 1, defaultPos, defaultRot, '3498db', '[已選舊圖]', totalIndex, isCover);
                    totalIndex++;
                });

                // 2. 再顯示新上傳的檔案
                if (hasFiles) {
                    Array.from(fileInput.files).forEach((file) => {
                        const capturedIndex = totalIndex; // 捕獲當前索引
                        const reader = new FileReader();
                        reader.onload = function (e) {
                            const defaultPos = "50% 50%";
                            const defaultRot = 0;
                            const isCover = (capturedIndex === 0 && selectedGalleryImages.length === 0);
                            // 注意：新檔案的 name 屬性是 filename，這裡我們只用於顯示
                            posList.innerHTML += createPosEditRow(e.target.result, file.name, defaultPos, defaultRot, '27ae60', '[新上傳]', capturedIndex, isCover);
                        }
                        reader.readAsDataURL(file);
                        totalIndex++;
                    });
                }

            } else {
                const editId = document.getElementById('editId').value;
                if (!editId) editor.classList.remove('active');
            }
        }

        // ✨ 圖庫相關功能 ✨
        async function openGallery() {
            document.getElementById('galleryModal').style.display = 'block';
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '載入中...';

            try {
                const res = await fetch(GALLERY_API);
                const images = await res.json();
                grid.innerHTML = '';

                if (images.length === 0) {
                    grid.innerHTML = '<p>伺服器尚無圖片，請先上傳。</p>';
                    return;
                }

                images.forEach(imgUrl => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    // 如果之前已經選過這張，加上 selected 樣式
                    if (selectedGalleryImages.includes(imgUrl)) div.classList.add('selected');

                    div.innerHTML = `<img src="${imgUrl}">`;
                    div.onclick = () => {
                        div.classList.toggle('selected');
                    };
                    grid.appendChild(div);
                });

            } catch (e) {
                console.error(e);
                grid.innerHTML = '<p style="color:red">無法載入圖片庫</p>';
            }
        }

        function closeGallery() {
            document.getElementById('galleryModal').style.display = 'none';
        }

        function confirmGallerySelection() {
            // 收集所有被選中的圖片
            const selectedItems = document.querySelectorAll('.gallery-item.selected img');
            selectedGalleryImages = Array.from(selectedItems).map(img => img.src);

            closeGallery();
            previewFiles(); // 更新預覽區
        }

        // 點擊 Modal 外圍關閉
        window.onclick = function (event) {
            const modal = document.getElementById('galleryModal');
            if (event.target == modal) closeGallery();
        }

        // --- 編輯功能 ---
        function startEdit(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;

            document.getElementById('editId').value = product.id;
            document.getElementById('pName').value = product.name;
            document.getElementById('pPrice').value = product.price;
            document.getElementById('pDesc').value = product.description;

            // ✨ 修正分類勾選邏輯 ✨
            // 先全部取消勾選
            document.querySelectorAll('input[name="category"]').forEach(cb => cb.checked = false);

            // 確保 product.category 是一個陣列 (後端現在會統一回傳陣列了)
            let cats = product.category;
            if (!Array.isArray(cats)) cats = [cats]; // 防呆：如果是舊字串，轉成陣列

            // 依序勾選
            cats.forEach(cat => {
                const cb = document.querySelector(`input[name="category"][value="${cat}"]`);
                if (cb) cb.checked = true;
            });

            // ... (以下是規格和圖片的舊有程式碼，保持不變) ...
            document.getElementById('variantList').innerHTML = '';
            if (product.variants && product.variants.length > 0) {
                product.variants.forEach(v => {
                    if (v.s1) addVariantRow(v.s1, v.s2 || "", v.price);
                    else if (v.name) addVariantRow(v.name, "", v.price);
                });
            }

            document.getElementById('formTitle').innerText = "編輯商品";
            document.getElementById('submitBtn').innerText = "確認修改";
            document.getElementById('cancelBtn').style.display = "block";
            document.getElementById('mainContainer').classList.add('editing');

            // ... (圖片預覽邏輯保持不變) ...
            selectedGalleryImages = product.images || [];
            document.getElementById('fileInput').value = "";
            document.getElementById('coverIndex').value = product.cover_index || 0;

            const posList = document.getElementById('positionList');
            const editor = document.getElementById('imagePositionEditor');
            posList.innerHTML = '';
            editor.classList.add('active');
            document.getElementById('positionTitle').innerText = "現有圖片 (可新增/刪除)";

            if (selectedGalleryImages.length > 0) {
                selectedGalleryImages.forEach((imgUrl, index) => {
                    // 如果後端傳來的不是 % 格式，需要轉一下嗎？目前假設後端存的已經是字串
                    let currentPos = (product.image_positions && product.image_positions[index]) || '50% 50%';
                    let currentRot = (product.image_rotations && product.image_rotations[index]) || 0;

                    // 舊資料相容：如果有 "center center" 這種格式，轉成 %
                    const mapping = {
                        'center center': '50% 50%', 'top center': '50% 0%', 'bottom center': '50% 100%',
                        'center left': '0% 50%', 'center right': '100% 50%', 'top left': '0% 0%', 'top right': '100% 0%'
                    };
                    if (mapping[currentPos]) currentPos = mapping[currentPos];

                    const isCover = (index === (product.cover_index || 0));
                    posList.innerHTML += createPosEditRow(imgUrl, index + 1, currentPos, currentRot, 'f39c12', '[原圖片]', index, isCover);
                });
            } else { posList.innerHTML = '<p style="padding:10px">無圖片</p>'; }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function resetForm() {
            document.getElementById('uploadForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('variantList').innerHTML = "";
            document.getElementById('positionList').innerHTML = "";
            document.getElementById('imagePositionEditor').classList.remove('active');
            document.getElementById('formTitle').innerText = "新增商品";
            document.getElementById('submitBtn').innerText = "立即上架";
            document.getElementById('cancelBtn').style.display = "none";
            document.getElementById('mainContainer').classList.remove('editing');
            selectedGalleryImages = []; // 清空已選舊圖
            document.getElementById('coverIndex').value = '0'; // 重置首圖
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            const editId = document.getElementById('editId').value;
            const formData = new FormData(e.target);
            const url = editId ? `${API_URL}/${editId}` : API_URL;
            const method = editId ? 'PUT' : 'POST';

            // 雙層規格
            const variants = [];
            document.querySelectorAll('.variant-row').forEach(row => {
                const vS1 = row.querySelector('.v-s1').value.trim();
                const vS2 = row.querySelector('.v-s2').value.trim();
                const vPrice = row.querySelector('.v-price').value.trim();
                if (vS1 && vPrice) {
                    variants.push({ s1: vS1, s2: vS2, price: parseInt(vPrice) });
                }
            });
            formData.append('variants', JSON.stringify(variants));

            // ✨ 關鍵：將使用者在圖庫選的圖片網址，append 到 formData ✨
            selectedGalleryImages.forEach(imgUrl => {
                formData.append('existing_images', imgUrl);
            });

            try {
                const res = await fetch(url, { method: method, body: formData });
                if (res.ok) {
                    alert(editId ? '商品修改成功！' : '商品上架成功！');
                    resetForm(); loadProducts();
                } else { alert('操作失敗'); }
            } catch (err) { console.error(err); alert('無法連線到伺服器'); }
            btn.disabled = false;
        });

        async function deleteProduct(id) {
            if (!confirm('確定要刪除這個商品嗎？')) return;
            try { await fetch(`${API_URL}/${id}`, { method: 'DELETE' }); loadProducts(); }
            catch (err) { alert('刪除失敗'); }
        }

        // ✨ 訂單列表功能 ✨
        async function loadOrders() {
            const orderList = document.getElementById('orderList');
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();

                if (orders.length === 0) {
                    orderList.innerHTML = '<p style="color: #999; text-align: center; padding: 2rem;">目前沒有訂單</p>';
                    return;
                }

                orderList.innerHTML = '';
                orders.forEach(order => {
                    // 解析訂單商品
                    let itemsHtml = '';
                    if (order.order_data && order.order_data.length > 0) {
                        itemsHtml = order.order_data.map(item =>
                            `${item.name} ${item.variant ? '(' + item.variant + ')' : ''} x${item.quantity}`
                        ).join('<br>');
                    }

                    orderList.innerHTML += `
                        <div class="product-item" style="flex-wrap: wrap;">
                            <div style="flex-grow: 1;">
                                <strong style="color: var(--accent);">訂單 #${order.id}</strong> - ${order.customer_name}<br>
                                <span style="color: #666; font-size: 0.9rem;">${itemsHtml}</span>
                            </div>
                            <div style="text-align: right; min-width: 150px;">
                                <strong style="color: #27ae60;">NT$ ${order.total_amount.toLocaleString()}</strong><br>
                                <span style="font-size: 0.8rem; color: #999;">${order.created_at}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error("載入訂單失敗", e);
                orderList.innerHTML = '<p style="color: red;">載入訂單失敗</p>';
            }
        }

        // ✨ 顧客留言列表功能 ✨
        async function loadContacts() {
            const contactList = document.getElementById('contactList');
            contactList.innerHTML = '載入中...';
            try {
                const res = await fetch('/api/contacts');
                const contacts = await res.json();

                if (contacts.length === 0) {
                    contactList.innerHTML = '<p style="color: #999; text-align: center; padding: 2rem;">目前沒有留言</p>';
                    return;
                }

                contactList.innerHTML = '';
                contacts.forEach(contact => {
                    contactList.innerHTML += `
                        <div class="product-item" style="flex-wrap: wrap; background: #fafafa; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                            <div style="flex-grow: 1;">
                                <strong style="color: #e67e22; font-size: 1.1rem;">✉️ ${contact.email}</strong><br>
                                <p style="margin-top: 8px; color: #444; line-height: 1.5; white-space: pre-wrap;">${contact.message}</p>
                            </div>
                            <div style="text-align: right; min-width: 150px;">
                                <span style="font-size: 0.8rem; color: #999;">${contact.created_at}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error("載入留言失敗", e);
                contactList.innerHTML = '<p style="color: red;">載入留言失敗</p>';
            }
        }

        loadProducts();
        loadOrders();
        loadContacts();

        // ==========================================
        // ✨ 新增函數：產生位置編輯列 HTML ✨
        // ==========================================
        function createPosEditRow(imgUrl, labelInfo, currentPos, currentRot, color, typeLabel, imgIndex = 0, isCover = false) {
            // Encode imgUrl to avoid breaking HTML if it contains special chars
            // But for blob URLs or local paths it's usually safe. 
            // We use a unique ID for the input to reference it later if needed, but simple passing logic is fine.
            return `
            <div class="pos-edit-item" style="border-left: 5px solid #${color};">
                <img src="${imgUrl}" class="pos-edit-img">
                <div style="flex-grow:1">
                    <label style="font-size:0.9rem; color:#${color};">${typeLabel} 圖片 ${labelInfo}：</label>
                    <label class="cover-radio-label ${isCover ? 'is-cover' : ''}">
                        <input type="radio" name="cover_select" value="${imgIndex}" ${isCover ? 'checked' : ''} onchange="document.getElementById('coverIndex').value=this.value; document.querySelectorAll('.cover-radio-label').forEach(l=>l.classList.remove('is-cover')); this.closest('.cover-radio-label').classList.add('is-cover');">
                        ⭐ 設為首圖
                    </label>
                    <div class="pos-control-row">
                        <!-- 位置輸入 (隱藏) -->
                        <input type="hidden" name="positions" value="${currentPos}">
                        <!-- 旋轉輸入 (隱藏) -->
                        <input type="hidden" name="rotations" value="${currentRot}">
                        
                        <!-- 顯示狀態 -->
                        <div class="pos-select-display" onclick="openPosEditor('${imgUrl}', this.parentElement)">
                            位置: ${currentPos} | 旋轉: ${currentRot}°
                        </div>
                        
                        <button type="button" class="btn-pos-edit" onclick="openPosEditor('${imgUrl}', this.parentElement)">調整</button>
                    </div>
                </div>
            </div>
            `;
        }

        // ==========================================
        // ✨ 視覺化拖曳編輯邏輯 (Visual Drag Editor) ✨
        // ==========================================
        let isDragging = false;
        let startX, startY;
        let currentXPct = 50;
        let currentYPct = 50;
        let currentRotation = 0; // ✨ 新增旋轉變數

        const posDragArea = document.getElementById('posDragArea');
        const posPreviewImg = document.getElementById('posPreviewImg');
        const posValueDisplay = document.getElementById('posValueDisplay');
        const rotValueDisplay = document.getElementById('rotValueDisplay');
        const rotationSlider = document.getElementById('rotationSlider');

        // Note: inputEl now refers to the CONTAINER (.pos-control-row)
        let currentEditingRow = null;

        function openPosEditor(imgSrc, controlRow) {
            currentEditingRow = controlRow;
            posPreviewImg.src = imgSrc;
            document.getElementById('posEditorModal').style.display = 'block';

            const posInput = controlRow.querySelector('input[name="positions"]');
            const rotInput = controlRow.querySelector('input[name="rotations"]');

            // Parse Pos
            const val = posInput.value || "50% 50%";
            const parts = val.split(' ');
            if (parts.length === 2) {
                currentXPct = parseFloat(parts[0]);
                currentYPct = parseFloat(parts[1]);
            } else {
                currentXPct = 50;
                currentYPct = 50;
            }

            // Parse Rot
            currentRotation = parseInt(rotInput.value) || 0;
            rotationSlider.value = currentRotation;

            updatePreview();
        }

        function closePosEditor() {
            document.getElementById('posEditorModal').style.display = 'none';
        }

        function savePosition() {
            if (currentEditingRow) {
                const posInput = currentEditingRow.querySelector('input[name="positions"]');
                const rotInput = currentEditingRow.querySelector('input[name="rotations"]');
                const displayDiv = currentEditingRow.querySelector('.pos-select-display');

                const newPos = `${currentXPct.toFixed(1)}% ${currentYPct.toFixed(1)}%`;
                const newRot = currentRotation;

                posInput.value = newPos;
                rotInput.value = newRot;
                displayDiv.innerText = `位置: ${newPos} | 旋轉: ${newRot}°`;
            }
            closePosEditor();
        }

        function updateRotationPreview(val) {
            currentRotation = parseInt(val);
            updatePreview();
        }

        function updatePreview() {
            // Update CSS
            posPreviewImg.style.objectPosition = `${currentXPct}% ${currentYPct}%`;
            posPreviewImg.style.transform = `rotate(${currentRotation}deg)`; // ✨ Apply Rotation

            // Update Text
            posValueDisplay.innerText = `${currentXPct.toFixed(0)}% ${currentYPct.toFixed(0)}%`;
            rotValueDisplay.innerText = `${currentRotation}°`;
        }

        // --- Drag Event Listeners ---
        // Mouse Events
        if (posDragArea) {
            posDragArea.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
            });

            window.addEventListener('mouseup', () => { isDragging = false; });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                handleDrag(e.clientX, e.clientY);
            });

            // Touch Events
            posDragArea.addEventListener('touchstart', (e) => {
                isDragging = true;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                e.preventDefault(); // Stop scroll
            });

            window.addEventListener('touchend', () => { isDragging = false; });

            window.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                handleDrag(e.touches[0].clientX, e.touches[0].clientY);
            });
        }

        function handleDrag(clientX, clientY) {
            // Sensibility factor
            const sensitivity = 0.5;
            const deltaX = clientX - startX;
            const deltaY = clientY - startY;

            // Update start pos for next frame
            startX = clientX;
            startY = clientY;

            // Update Percentages
            currentXPct += deltaX * sensitivity;
            currentYPct += deltaY * sensitivity;

            // Clamp 0-100
            if (currentXPct < 0) currentXPct = 0;
            if (currentXPct > 100) currentXPct = 100;
            if (currentYPct < 0) currentYPct = 0;
            if (currentYPct > 100) currentYPct = 100;

            updatePreview();
        }

        // ==========================================
        // ✨ 分頁籤切換與圖片庫管理 JS ✨
        // ==========================================
        function switchTab(tabId) {
            // 1. 切換按鈕狀態
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // 2. 切換內容顯示
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');

            // 3. 特殊處理：如果是圖片庫或留言 Tab，自動載入
            if (tabId === 'tab-gallery') {
                loadGalleryManager();
            } else if (tabId === 'tab-contacts') {
                loadContacts();
            }
        }

        async function loadGalleryManager() {
            const grid = document.getElementById('galleryManagerGrid');
            grid.innerHTML = '載入中...';
            try {
                const res = await fetch(GALLERY_API);
                const images = await res.json();
                grid.innerHTML = '';

                if (images.length === 0) {
                    grid.innerHTML = '<p>目前沒有任何圖片</p>';
                    return;
                }

                images.forEach(imgUrl => {
                    // Extract filename for display/delete
                    const filename = imgUrl.split('/').pop();

                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.style.cursor = "default"; // Manager mode doesn't select

                    div.innerHTML = `
                        <img src="${imgUrl}" onclick="window.open('${imgUrl}', '_blank')">
                        <button class="gallery-delete-btn" onclick="deleteImage('${filename}')" title="刪除圖片">×</button>
                    `;
                    grid.appendChild(div);
                });
            } catch (e) {
                console.error(e);
                grid.innerHTML = '<p style="color:red">無法載入圖片</p>';
            }
        }

        async function deleteImage(filename) {
            if (!confirm(`確定要永久刪除圖片 "${filename}" 嗎？\n(注意：如果有商品正在使用此圖，圖片將會失效)`)) return;

            try {
                // DELETE /api/images?filename=xxx
                const res = await fetch(`${GALLERY_API}?filename=${encodeURIComponent(filename)}`, {
                    method: 'DELETE'
                });
                const result = await res.json();

                if (res.ok) {
                    // Refresh gallery
                    loadGalleryManager();
                } else {
                    alert('刪除失敗：' + (result.error || '未知錯誤'));
                }
            } catch (e) {
                console.error(e);
                alert('無法連線伺服器');
            }
        }

    </script>
</body>

</html>
