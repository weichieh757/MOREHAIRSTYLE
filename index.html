    <script>
        window.products = [];

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('momoCart')) || [];
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = count;
        }

        function setupResponsiveVideo() {
            const heroVideo = document.getElementById('hero-video');
            if (!heroVideo) return;

            const isMobile = window.matchMedia('(max-width: 768px)').matches;
            const source = heroVideo.querySelector('source');
            const desktopVideoSrc = '/uploads/slide1.mp4';
            const mobileVideoSrc = '/uploads/slide1.mp4';
            const targetSrc = isMobile ? mobileVideoSrc : desktopVideoSrc;

            if (source.src !== window.location.origin + targetSrc) {
                source.src = targetSrc;
                heroVideo.load();
            }
        }

        window.addEventListener('resize', setupResponsiveVideo);

        function initScrollAnimation() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');

                    if (entry.isIntersecting) {
                        const content = entry.target.querySelector('.story-content');
                        if (content) content.classList.add('visible');
                        if (video) {
                            video.play().catch(e => console.log("自動播放需使用者互動"));
                        }
                    } else {
                        const content = entry.target.querySelector('.story-content');
                        if (content) content.classList.remove('visible');
                        if (video) video.pause();
                    }
                });
            }, { threshold: 0.3 });

            document.querySelectorAll('.story-section').forEach(section => {
                observer.observe(section);
            });
        }

        async function fetchProducts() {
            try {
                const response = await fetch('/api/products');
                if (!response.ok) throw new Error('連線失敗');
                window.products = await response.json();
                render();
            } catch (error) {
                console.error(error);
                if (document.getElementById('product-section').style.display !== 'none') {
                    document.getElementById('product-grid').innerHTML = '<p style="text-align:center;">無法連線到伺服器 (請確認網路連線)</p>';
                }
            }
        }

        function render() {
            const params = new URLSearchParams(window.location.search);
            const category = params.get('cat');

            const bannerSection = document.getElementById('home-banner');
            const productSection = document.getElementById('product-section');
            const bookingSection = document.getElementById('booking-section'); // 抓取表單區塊

            const categoryOrder = [
                "洗髮", "染髮", "燙髮", "保養", "煥采",
                "活萃", "R.O.8", "S.I.G", "日本", "韓國", "其他"
            ];

            if (category) {
                // 進入商品頁模式：關閉捲動捕捉，顯示商品，同時【顯示表單】
                document.documentElement.classList.remove('snap-active');
                bannerSection.style.display = 'none';
                productSection.style.display = 'block';
                if (bookingSection) bookingSection.style.display = 'block';

                let displayList = [];

                if (category === 'all') {
                    document.getElementById('page-title').innerText = "所有商品";
                    displayList = [...window.products];

                    displayList.sort((a, b) => {
                        const getOrderIndex = (product) => {
                            const cats = Array.isArray(product.category) ? product.category : [product.category];
                            let minIndex = 999;
                            cats.forEach(c => {
                                const idx = categoryOrder.indexOf(c);
                                if (idx !== -1 && idx < minIndex) minIndex = idx;
                            });
                            return minIndex;
                        };
                        return getOrderIndex(a) - getOrderIndex(b);
                    });
                } else {
                    document.getElementById('page-title').innerText = `${category} 系列`;
                    displayList = window.products.filter(p => {
                        if (Array.isArray(p.category)) return p.category.includes(category);
                        return p.category === category;
                    });
                }

                if (displayList.length === 0) {
                    document.getElementById('product-grid').innerHTML = '<p style="grid-column: 1/-1; text-align:center;">此分類尚無商品</p>';
                    return;
                }

                let html = '';
                displayList.forEach(p => {
                    let imageList = (p.images && p.images.length > 0) ? p.images : [p.image];
                    let posList = (p.image_positions && p.image_positions.length > 0) ? p.image_positions : Array(imageList.length).fill('center center');
                    let rotList = (p.image_rotations && p.image_rotations.length > 0) ? p.image_rotations : Array(imageList.length).fill(0);

                    const coverIdx = (p.cover_index != null && p.cover_index < imageList.length) ? p.cover_index : 0;
                    const coverSrc = imageList[coverIdx];
                    const positionStyle = `object-position: ${posList[coverIdx] || 'center center'};`;
                    const rotStyle = `--rot: ${rotList[coverIdx] || 0}deg;`;

                    html += `
                        <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
                            <div class="card-image-box">
                                <img src="${coverSrc}" alt="${p.name}" class="card-img active" style="${positionStyle} ${rotStyle}" onerror="this.src='https://placehold.co/400x400?text=No+Image'">
                            </div>
                            <div class="product-info">
                                <h3>${p.name}</h3>
                                <p style="font-size: 0.9rem;">點擊查看詳情</p>
                                <span class="btn-buy">瞭解更多</span>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('product-grid').innerHTML = html;

            } else {
                // 首頁全螢幕模式：開啟捲動捕捉，顯示橫幅，【隱藏表單】避免卡住
                document.documentElement.classList.add('snap-active');
                bannerSection.style.display = 'block';
                productSection.style.display = 'none';
                if (bookingSection) bookingSection.style.display = 'none';
                initScrollAnimation();
            }

            updateCartCount();
        }

        window.onload = function () {
            setupResponsiveVideo();
            fetchProducts();
        };

        const hamburger = document.querySelector('.hamburger');
        const navUl = document.querySelector('nav ul');
        const menuOverlay = document.querySelector('.menu-overlay');
        const menuCloseBtn = document.querySelector('.menu-close-btn');

        function openMenu() {
            hamburger.classList.add('active');
            navUl.classList.add('active');
            if (menuOverlay) menuOverlay.classList.add('active');
        }

        function closeMenu() {
            hamburger.classList.remove('active');
            navUl.classList.remove('active');
            if (menuOverlay) menuOverlay.classList.remove('active');
        }

        if (hamburger) {
            hamburger.addEventListener('click', () => {
                if (navUl.classList.contains('active')) {
                    closeMenu();
                } else {
                    openMenu();
                }
            });

            if (menuCloseBtn) {
                menuCloseBtn.addEventListener('click', closeMenu);
            }

            if (menuOverlay) {
                menuOverlay.addEventListener('click', closeMenu);
            }

            document.querySelectorAll('nav a').forEach(link => {
                link.addEventListener('click', (e) => {
                    const parentDropdown = link.closest('.dropdown');
                    if (parentDropdown && link === parentDropdown.querySelector(':scope > a')) {
                        e.preventDefault();
                        parentDropdown.classList.toggle('active');
                        return;
                    }
                    closeMenu();
                });
            });
        }

        function highlightCategoryBar() {
            const params = new URLSearchParams(window.location.search);
            const cat = params.get('cat');
            const bar = document.getElementById('category-bar');
            if (!bar) return;

            if (cat) {
                bar.style.display = 'flex';
                bar.querySelectorAll('a').forEach(a => {
                    a.classList.toggle('active', a.dataset.cat === cat);
                });
            } else {
                bar.style.display = 'none';
            }
        }
        highlightCategoryBar();

        const backToTopBtn = document.getElementById('back-to-top');
        if (backToTopBtn) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    backToTopBtn.classList.add('visible');
                } else {
                    backToTopBtn.classList.remove('visible');
                }
            });
            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
    </script>
